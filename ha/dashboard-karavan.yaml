# Záložka "Karavan" pro Home Assistant (sections, 3 vyvážené sloupce).
# Display precision senzorů: HA → entita → zobrazená přesnost (viz docs/home-assistant.md).
type: sections
max_columns: 3
dense_section_placement: true
title: Karavan
path: karavan
icon: mdi:rv-truck
sections:
- type: grid
  cards:
  - type: heading
    heading: 🚐 Stav & baterie
    icon: mdi:rv-truck
  - type: entities
    title: Klima & napájení
    show_header_toggle: false
    entities:
    - entity: sensor.hobby_495ul_karavan_teplota_vnitrni
      name: Teplota vnitřní
      icon: mdi:home-thermometer
    - entity: sensor.hobby_495ul_karavan_teplota_venkovni
      name: Teplota venkovní
      icon: mdi:thermometer
    - entity: sensor.hobby_495ul_karavan_napajeni
      name: Napájení 230V
      icon: mdi:power-plug
    - entity: sensor.hobby_495ul_karavan_sw_verze
      name: SW verze
      icon: mdi:application-braces-outline
  - type: horizontal-stack
    cards:
    - type: gauge
      entity: sensor.hobby_495ul_karavan_baterie_nabiti
      name: Nabití
      min: 0
      max: 100
      unit: '%'
      needle: true
      severity:
        red: 0
        yellow: 20
        green: 50
    - type: gauge
      entity: sensor.hobby_495ul_karavan_baterie_napeti
      name: Napětí
      min: 10
      max: 16
      needle: true
      severity:
        red: 10
        yellow: 11.8
        green: 12.5
  - type: entities
    title: Baterie & voda
    show_header_toggle: false
    entities:
    - entity: sensor.hobby_495ul_karavan_baterie_proud
      name: Proud
      icon: mdi:current-dc
    - entity: sensor.hobby_495ul_karavan_baterie_zbyva
      name: Zbývá
      icon: mdi:timer-sand
    - entity: sensor.hobby_495ul_karavan_baterie_teplota
      name: Teplota baterie
      icon: mdi:thermometer-lines
    - entity: sensor.hobby_495ul_karavan_nadrz_vody
      name: Nádrž vody
      icon: mdi:water
- type: grid
  cards:
  - type: heading
    heading: 💡 Světla
    icon: mdi:lightbulb-group
  - type: entities
    title: Spínaná
    show_header_toggle: false
    entities:
    - entity: switch.hobby_495ul_karavan_svetlo_kuchyn
      name: Kuchyň
    - entity: switch.hobby_495ul_karavan_svetlo_venku
      name: Venku
    - entity: switch.hobby_495ul_karavan_ambient_1
      name: Ambient 1
    - entity: switch.hobby_495ul_karavan_ambient_2
      name: Ambient 2
    - entity: switch.hobby_495ul_karavan_ambient_3
      name: Ambient 3
  - type: horizontal-stack
    cards:
    - type: tile
      entity: light.hobby_495ul_karavan_svetlo_obyvak
      name: Obývák
      features:
      - type: light-brightness
    - type: tile
      entity: light.hobby_495ul_karavan_ambient_zadni_okno
      name: Zadní okno
      features:
      - type: light-brightness
  - type: entities
    title: Centrální
    show_header_toggle: false
    entities:
    - entity: switch.hobby_495ul_karavan_hlavni_vypinac
      name: Hlavní vypínač
      icon: mdi:power
    - entity: switch.hobby_495ul_karavan_svetla_vse
      name: Všechna světla
      icon: mdi:lightbulb-group
    - entity: switch.hobby_495ul_karavan_bojler
      name: Ohřev vody (bojler)
      icon: mdi:water-boiler
- type: grid
  cards:
  - type: heading
    heading: 🧊 Lednice & ❄️ klima
    icon: mdi:fridge
  - type: entities
    title: Lednice (TEST – ověřit)
    show_header_toggle: false
    entities:
    - entity: switch.hobby_495ul_karavan_lednice
      name: Lednice zap/vyp
    - entity: select.hobby_495ul_karavan_lednice_rezim_test
      name: Režim
    - entity: number.hobby_495ul_karavan_lednice_teplota_test
      name: Teplota (1–5)
  - type: tile
    entity: climate.karavan_klimatizace
    name: Klima – zap/vyp & režim
    features:
    - type: climate-hvac-modes
      hvac_modes:
      - 'off'
      - cool
      - heat
      - dry
      - fan_only
      - auto
    grid_options:
      columns: full
  - type: thermostat
    entity: climate.karavan_klimatizace
  - type: entities
    title: Diagnostika
    show_header_toggle: false
    entities:
    - entity: text.hobby_495ul_karavan_raw_cmd
      name: RAW příkaz (BLE)
