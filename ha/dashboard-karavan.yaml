# Záložka "Karavan" pro Home Assistant (styl sections).
# Vyžaduje HACS: apexcharts-card. Vlož přes Dashboard → Upravit → Raw konfigurace jako nový view.
# Uprav prefix entit (hobby_495ul_karavan_) dle názvu svého zařízení.
type: sections
max_columns: 3
title: Karavan
path: karavan
icon: mdi:rv-truck
sections:
- type: grid
  cards:
  - type: heading
    heading: 🚐 Hobby De Luxe 495 UL
    icon: mdi:rv-truck
  - type: entities
    title: Klima & napájení
    show_header_toggle: false
    entities:
    - entity: sensor.hobby_495ul_karavan_teplota_vnitrni
      name: Teplota vnitřní
      icon: mdi:home-thermometer
    - entity: sensor.hobby_495ul_karavan_teplota_venkovni
      name: Teplota venkovní
      icon: mdi:thermometer
    - entity: sensor.hobby_495ul_karavan_napajeni
      name: Napájení 230V
      icon: mdi:power-plug
    - entity: sensor.hobby_495ul_karavan_sw_verze
      name: SW verze
      icon: mdi:application-braces-outline
  - type: custom:apexcharts-card
    graph_span: 24h
    header:
      show: true
      title: 🌡️ Teploty (24 h)
    series:
    - entity: sensor.hobby_495ul_karavan_teplota_vnitrni
      name: Vnitřní
    - entity: sensor.hobby_495ul_karavan_teplota_venkovni
      name: Venkovní
- type: grid
  cards:
  - type: heading
    heading: 🔋 Baterie & voda
    icon: mdi:car-battery
  - type: horizontal-stack
    cards:
    - type: gauge
      entity: sensor.hobby_495ul_karavan_baterie_nabiti
      name: Nabití
      min: 0
      max: 100
      unit: '%'
      needle: true
      severity:
        red: 0
        yellow: 20
        green: 50
    - type: gauge
      entity: sensor.hobby_495ul_karavan_baterie_napeti
      name: Napětí
      min: 10
      max: 16
      needle: true
      severity:
        red: 10
        yellow: 11.8
        green: 12.5
  - type: entities
    show_header_toggle: false
    entities:
    - entity: sensor.hobby_495ul_karavan_baterie_proud
      name: Proud
      icon: mdi:current-dc
    - entity: sensor.hobby_495ul_karavan_baterie_zbyva
      name: Zbývá
      icon: mdi:timer-sand
    - entity: sensor.hobby_495ul_karavan_baterie_teplota
      name: Teplota baterie
      icon: mdi:thermometer-lines
    - entity: sensor.hobby_495ul_karavan_nadrz_vody
      name: Nádrž vody
      icon: mdi:water
  - type: custom:apexcharts-card
    graph_span: 24h
    header:
      show: true
      title: Baterie (24 h)
    yaxis:
    - id: v
      min: 10
      max: 16
      decimals: 1
    - id: pct
      opposite: true
      min: 0
      max: 100
      decimals: 0
    series:
    - entity: sensor.hobby_495ul_karavan_baterie_napeti
      name: Napětí (V)
      yaxis_id: v
    - entity: sensor.hobby_495ul_karavan_baterie_nabiti
      name: Nabití (%)
      yaxis_id: pct
- type: grid
  cards:
  - type: heading
    heading: 💡 Světla
    icon: mdi:lightbulb-group
  - type: entities
    title: Spínaná
    show_header_toggle: false
    entities:
    - entity: switch.hobby_495ul_karavan_svetlo_kuchyn
      name: Kuchyň
    - entity: switch.hobby_495ul_karavan_svetlo_venku
      name: Venku
    - entity: switch.hobby_495ul_karavan_ambient_1
      name: Ambient 1
    - entity: switch.hobby_495ul_karavan_ambient_2
      name: Ambient 2
    - entity: switch.hobby_495ul_karavan_ambient_3
      name: Ambient 3
  - type: horizontal-stack
    cards:
    - type: tile
      entity: light.hobby_495ul_karavan_svetlo_obyvak
      name: Obývák
      features:
      - type: light-brightness
    - type: tile
      entity: light.hobby_495ul_karavan_ambient_zadni_okno
      name: Zadní okno
      features:
      - type: light-brightness
  - type: entities
    title: Centrální
    show_header_toggle: false
    entities:
    - entity: switch.hobby_495ul_karavan_hlavni_vypinac
      name: Hlavní vypínač
      icon: mdi:power
    - entity: switch.hobby_495ul_karavan_svetla_vse
      name: Všechna světla
      icon: mdi:lightbulb-group
- type: grid
  cards:
  - type: heading
    heading: 🧊 Lednice & 💧 bojler
    icon: mdi:fridge
  - type: entities
    title: Lednice (TEST – ověřit)
    show_header_toggle: false
    entities:
    - entity: switch.hobby_495ul_karavan_lednice
      name: Lednice zap/vyp
    - entity: select.hobby_495ul_karavan_lednice_rezim_test
      name: Režim
    - entity: number.hobby_495ul_karavan_lednice_teplota_test
      name: Teplota (1–5)
  - type: entities
    title: Ohřev vody
    show_header_toggle: false
    entities:
    - entity: switch.hobby_495ul_karavan_bojler
      name: Bojler
      icon: mdi:water-boiler
- type: grid
  cards:
  - type: heading
    heading: ❄️ Klimatizace Sinclair
    heading_style: title
    icon: mdi:air-conditioner
  - type: thermostat
    entity: climate.karavan_klimatizace
  - type: entities
    title: Diagnostika
    show_header_toggle: false
    entities:
    - entity: text.hobby_495ul_karavan_raw_cmd
      name: RAW příkaz (BLE)
